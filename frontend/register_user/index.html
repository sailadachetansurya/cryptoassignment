<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register EV Owner</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="container">
        <h2>EV Owner Registration</h2>
        <p>Register a new owner on the Grid. Credentials will be securely hashed and added to CSV.</p>
        <form id="register-user-form">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" placeholder="John Doe" required>
            </div>
            
            <div class="form-group">
                <label for="mobile">Mobile Number:</label>
                <input type="text" id="mobile" placeholder="9876543210" required>
            </div>
            
            <div class="form-group">
                <label for="pin">Create PIN:</label>
                <input type="password" id="pin" placeholder="Enter PIN" required>
            </div>
            
            <div class="form-group">
                <label for="balance">Initial Balance ($):</label>
                <input type="number" id="balance" placeholder="100.00" value="100.00" required step="0.01">
            </div>
            
            <button type="submit">Complete Registration</button>
        </form>
        <div id="status" class="status-badge" style="display: none;"></div>
        
        <div id="result" style="display: none; background: var(--surface-light); padding: 15px; margin-top: 20px; border-radius: 8px;">
            <h4 style="margin-top: 0;">Registration Successful!</h4>
            <p>Save these credentials. They form your Digital Identity.</p>
            <div><strong>UID:</strong> <span id="res-uid"></span></div>
            <div><strong>VMID (Login ID):</strong> <span id="res-vmid"></span></div>
            <p style="color: var(--accent-light); font-size: 0.85em;">Data securely saved to CSVs & credentials text file.</p>
        </div>
        
        <div style="margin-top: 20px; text-align: center;">
            <a href="../index.html" style="color: var(--accent-color);">Back to Hub</a>
        </div>
    </div>

    <script src="register_user.js"></script>
</body>
</html>
