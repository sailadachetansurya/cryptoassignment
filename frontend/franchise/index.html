<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Franchise Directory</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="container" style="max-width: 900px;">
        <h2>Franchise Directory</h2>
        <p style="color: var(--text-secondary); margin-bottom: 20px;">
            A complete list of registered charging station franchises on the Grid.
        </p>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3>Registered Franchises</h3>
            <button id="refresh-btn" style="width: auto; padding: 8px 15px;">Refresh List</button>
        </div>
        
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>FID</th>
                        <th>Name</th>
                        <th>Provider</th>
                        <th>Zone</th>
                        <th>Balance</th>
                    </tr>
                </thead>
                <tbody id="franchise-table-body">
                    <tr><td colspan="5" style="text-align:center; color: var(--text-secondary)">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <div style="margin-top: 30px; text-align: center;">
            <a href="../index.html" style="color: var(--accent-color);">Back to Hub</a>
        </div>
    </div>
    
    <script src="franchise.js"></script>
</body>
</html>
